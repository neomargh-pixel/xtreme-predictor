<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTREME Predictor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <h1>🚀 XTREME Predictor</h1>
    <p>Pronóstico Estadístico de Animalitos</p>
</header>

<main>

<div class="card">
<h2>📅 Pronóstico de Hoy</h2>
<p><strong>Última actualización:</strong> Hoy</p>
</div>

<div class="card">
<h2>🔥 Top 10</h2>

<table id="tablaResultados">
<tr>
<th>#</th>
<th>Animal</th>
<th>Puntaje</th>
<th>Estado</th>
</tr>
</table>

</div>

<div class="card">
<h2>📊 Estadísticas</h2>

<p>🐎 Más destacado: <span id="destacado">-</span></p>
<p>⏳ Mayor atraso: <span id="atrasado">-</span></p>
<p>📈 Tendencia: <span id="tendencia">-</span></p>

</div>

<div class="card">
<h2>💎 Área Premium</h2>
<p>Disponible para suscriptores.</p>
</div>

</main>

<script src="animales.js"></script>
<script src="resultados.js"></script>
<script src="algoritmo.js"></script>
<script src="script.js"></script>

</body>
</html>
