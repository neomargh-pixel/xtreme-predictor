<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XTREME Predictor</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <h1>🚀 XTREME Predictor</h1>
    <p>Análisis Inteligente de Animalitos</p>
</header>

<div class="banner">
    <div class="overlay">
        <h2>🐎 Bienvenido</h2>
        <p>Selecciona una lotería y consulta el análisis.</p>
    </div>
</div>

<main>

<div class="card">

<h2>🎯 Seleccionar Lotería</h2>

<select>
<option>🦉 Guácharo Activo</option>
<option>🐓 La Granjita</option>
<option>🌴 Selva Plus</option>
<option>⭐ Granja Millonaria</option>
</select>

</div>

<div class="card">

<h2>🐎 Animales destacados</h2>

<div class="animals">

🐎 🐅 🦁 🐂 🐊 🐍 🐒 🐓 🦅 🐘

</div>

</div>

<div class="card">

<h2>📊 Ranking del algoritmo</h2>

<table id="tablaResultados">

<tr>

<th>#</th>

<th>Animal</th>

<th>Puntaje</th>

</tr>

<tr><td>1</td><td>🐎 Caballo</td><td>98</td></tr>

<tr><td>2</td><td>🐅 Tigre</td><td>94</td></tr>

<tr><td>3</td><td>🦁 León</td><td>91</td></tr>

<tr><td>4</td><td>🐓 Gallo</td><td>88</td></tr>

<tr><td>5</td><td>🐊 Caimán</td><td>85</td></tr>

</table>

</div>

<div class="card">

<button onclick="cargarAnimales()">🐾 Cargar animales</button>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
